# Single-axis model tiers. Each agent picks one model_class; every provider
# maps that class to exactly one model (+ reasoning effort where supported).
# Ladder: heavy > strong > balanced > fast.

[providers.claude]
heavy = { model = "fable" }
strong = { model = "opus" }
balanced = { model = "sonnet" }
fast = { model = "haiku" }

[providers.copilot]
heavy = { model = "gpt-5.6-sol", reasoning = "high" }
strong = { model = "gpt-5.6-terra", reasoning = "high" }
balanced = { model = "gpt-5.6-luna", reasoning = "xhigh" }
fast = { model = "claude-sonnet-5" }

[providers.codex]
heavy = { model = "gpt-5.6-sol", reasoning = "high" }
strong = { model = "gpt-5.6-terra", reasoning = "high" }
balanced = { model = "gpt-5.6-luna", reasoning = "xhigh" }
fast = { model = "gpt-5.6-luna", reasoning = "medium" }

[providers.pi]
heavy = { model = "openai-codex/gpt-5.6-sol", reasoning = "high" }
strong = { model = "openai-codex/gpt-5.6-terra", reasoning = "high" }
balanced = { model = "openai-codex/gpt-5.6-luna", reasoning = "xhigh" }
fast = { model = "zai/glm-5.2", reasoning = "low" }

# Codex CLI settings shared by every compiled agent; templates override per key.
[codex]
web_search = "live"
personality = "pragmatic"
suppress_unstable_features_warning = true
tui_status_line = [
  "model-with-reasoning",
  "context-remaining",
  "codex-version",
  "session-id",
  "memory-progress",
]
